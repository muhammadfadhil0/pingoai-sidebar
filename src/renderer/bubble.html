<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Bubble</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: visible;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    .bubble-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 10px;
      opacity: 1;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .bubble-container.fade-out {
      opacity: 0;
      transform: scale(0.95);
      pointer-events: none;
    }

    .ai-bubble {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6b35 0%, #ff5722 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255, 107, 53, 0.4);
      transition: all 0.3s ease;
    }

    .ai-bubble:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 16px rgba(255, 107, 53, 0.6);
    }

    .ai-bubble:active {
      transform: scale(1.05);
    }

    .ai-bubble-logo {
      width: 32px;
      height: 32px;
      object-fit: cover;
    }

    .ai-icon {
      width: 28px;
      height: 28px;
      fill: white;
    }

    .popup-menu {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) scale(0.95);
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      padding: 8px;
      min-width: 200px;
      opacity: 0;
      visibility: hidden;
      z-index: 1000;
      transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
    }

    .popup-menu.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) scale(1);
    }

    .menu-item {
      padding: 12px 16px;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #333;
    }

    .menu-item:hover {
      background: #fff5eb;
    }

    .menu-item svg {
      width: 18px;
      height: 18px;
      fill: #ff6b35;
    }

    .translate-submenu {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) scale(0.95);
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      padding: 8px;
      min-width: 200px;
      opacity: 0;
      visibility: hidden;
      z-index: 1001;
      transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
    }

    .translate-submenu.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) scale(1);
    }

    .translate-lang-item {
      padding: 12px 16px;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #333;
    }

    .translate-lang-item:hover {
      background: #fff5eb;
    }

    .translate-lang-item .flag {
      font-size: 18px;
    }

    .translate-custom-container {
      padding: 8px;
      border-top: 1px solid #e5e7eb;
      margin-top: 4px;
    }

    .translate-custom-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .translate-custom-input {
      width: 100%;
      padding: 10px 40px 10px 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .translate-custom-input:focus {
      outline: none;
      border-color: #ff6b35;
    }

    .translate-custom-input::placeholder {
      color: #9ca3af;
    }

    .send-translate-btn {
      position: absolute;
      right: 6px;
      width: 28px;
      height: 28px;
      background: #ff6b35;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .send-translate-btn:hover {
      background: #ff5722;
    }

    .send-translate-btn svg {
      width: 16px;
      height: 16px;
      fill: white;
    }

    .custom-command-container {
      padding: 8px;
      border-top: 1px solid #e5e7eb;
      margin-top: 4px;
    }

    .custom-command-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .custom-command-input {
      width: 100%;
      padding: 10px 40px 10px 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .custom-command-input:focus {
      outline: none;
      border-color: #ff6b35;
    }

    .custom-command-input::placeholder {
      color: #9ca3af;
    }

    .send-custom-btn {
      position: absolute;
      right: 6px;
      width: 28px;
      height: 28px;
      background: #ff6b35;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .send-custom-btn:hover {
      background: #ff5722;
    }

    .send-custom-btn svg {
      width: 16px;
      height: 16px;
      fill: white;
    }

    .menu-divider {
      height: 1px;
      background: #e5e7eb;
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div class="bubble-container">
    <div class="ai-bubble" id="aiBubble">
      <img src="../../assets/bubble_ai.png" alt="AI" class="ai-bubble-logo">
    </div>
    
    <div class="popup-menu" id="popupMenu">
      <div class="menu-item" data-action="explain">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M11 18h2v-2h-2v2zm1-16C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/>
        </svg>
        <span>Jelaskan</span>
      </div>
      <div class="menu-item" data-action="summarize">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/>
        </svg>
        <span>Ringkaskan</span>
      </div>
      <div class="menu-item" data-action="formalize">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 17H4v2h10v-2zm6-8H4v2h16V9zM4 15h16v-2H4v2zM4 5v2h16V5H4z"/>
        </svg>
        <span>Buat Formal</span>
      </div>
      <div class="menu-item" data-action="bullet-points">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 10.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0-6c-.83 0-1.5.67-1.5 1.5S3.17 7.5 4 7.5 5.5 6.83 5.5 6 4.83 4.5 4 4.5zm0 12c-.83 0-1.5.68-1.5 1.5s.68 1.5 1.5 1.5 1.5-.68 1.5-1.5-.67-1.5-1.5-1.5zM7 19h14v-2H7v2zm0-6h14v-2H7v2zm0-8v2h14V5H7z"/>
        </svg>
        <span>Buat Point</span>
      </div>
      <div class="menu-item" id="translateMenuItem" data-action="translate">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/>
        </svg>
        <span>Translate</span>
      </div>
      
      <div class="menu-divider"></div>
      
      <div class="custom-command-container">
        <div class="custom-command-wrapper">
          <input type="text" class="custom-command-input" id="customCommandInput" placeholder="Perintah lainnya...">
          <button class="send-custom-btn" id="sendCustomBtn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Translate Submenu -->
    <div class="translate-submenu" id="translateSubmenu">
      <div class="translate-lang-item" data-lang="English">
        <span class="flag">🇬🇧</span>
        <span>English</span>
      </div>
      <div class="translate-lang-item" data-lang="Indonesian">
        <span class="flag">🇮🇩</span>
        <span>Indonesia</span>
      </div>
      <div class="translate-lang-item" data-lang="Japanese">
        <span class="flag">🇯🇵</span>
        <span>Japan</span>
      </div>
      
      <div class="translate-custom-container">
        <div class="translate-custom-wrapper">
          <input type="text" class="translate-custom-input" id="translateCustomInput" placeholder="Bahasa lainnya...">
          <button class="send-translate-btn" id="sendTranslateBtn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const aiBubble = document.getElementById('aiBubble');
    const popupMenu = document.getElementById('popupMenu');
    const translateMenuItem = document.getElementById('translateMenuItem');
    const translateSubmenu = document.getElementById('translateSubmenu');
    const translateCustomInput = document.getElementById('translateCustomInput');
    const sendTranslateBtn = document.getElementById('sendTranslateBtn');
    const customCommandInput = document.getElementById('customCommandInput');
    const sendCustomBtn = document.getElementById('sendCustomBtn');
    const bubbleContainer = document.querySelector('.bubble-container');

    const FADE_TIMEOUT_MS = 220;
    let hideBubblePromise = null;

    function hideBubbleWithFade() {
      if (hideBubblePromise) {
        return hideBubblePromise;
      }

      if (!bubbleContainer) {
        return window.electronAPI.hideBubble();
      }

      hideBubblePromise = new Promise((resolve) => {
        let completed = false;

        const finalizeHide = async () => {
          if (completed) {
            return;
          }
          completed = true;
          bubbleContainer.removeEventListener('transitionend', onTransitionEnd);
          await window.electronAPI.hideBubble();
          resolve();
        };

        const onTransitionEnd = (event) => {
          if (event.propertyName === 'opacity') {
            finalizeHide();
          }
        };

        popupMenu.classList.remove('show');
        translateSubmenu.classList.remove('show');

        requestAnimationFrame(() => {
          bubbleContainer.classList.add('fade-out');
        });

        bubbleContainer.addEventListener('transitionend', onTransitionEnd);
        setTimeout(finalizeHide, FADE_TIMEOUT_MS);
      });

      return hideBubblePromise;
    }

    aiBubble.addEventListener('click', (event) => {
      event.stopPropagation();
      popupMenu.classList.toggle('show');
      translateSubmenu.classList.remove('show');
    });

    document.addEventListener('click', (e) => {
      if (!popupMenu.contains(e.target) && !aiBubble.contains(e.target) && !translateSubmenu.contains(e.target)) {
        popupMenu.classList.remove('show');
        translateSubmenu.classList.remove('show');
        hideBubbleWithFade();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' || event.key === 'Esc') {
        hideBubbleWithFade();
      }
    });

    // Toggle translate submenu when clicking translate menu
    translateMenuItem.addEventListener('click', (e) => {
      e.stopPropagation();
      popupMenu.classList.remove('show');
      translateSubmenu.classList.add('show');
    });

    // Handle preset language selection
    document.querySelectorAll('.translate-lang-item').forEach(item => {
      item.addEventListener('click', async () => {
        const lang = item.dataset.lang;
        await window.electronAPI.sendTextAction('translate', lang);
        await hideBubbleWithFade();
      });
    });

    // Handle custom translate language
    async function sendCustomTranslate() {
      const customLang = translateCustomInput.value.trim();
      if (customLang) {
        await window.electronAPI.sendTextAction('translate', customLang);
        await hideBubbleWithFade();
      }
    }

    sendTranslateBtn.addEventListener('click', sendCustomTranslate);
    
    translateCustomInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        sendCustomTranslate();
      }
    });

    // Handle custom command
    async function sendCustomCommand() {
      const customCommand = customCommandInput.value.trim();
      if (customCommand) {
        await window.electronAPI.sendTextAction('custom', customCommand);
        await hideBubbleWithFade();
      }
    }

    sendCustomBtn.addEventListener('click', sendCustomCommand);
    
    customCommandInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        sendCustomCommand();
      }
    });

    // Handle other menu items
    document.querySelectorAll('.menu-item').forEach(item => {
      if (item.id !== 'translateMenuItem') {
        item.addEventListener('click', async () => {
          const action = item.dataset.action;
          
          // Send the action to chat window
          await window.electronAPI.sendTextAction(action);
          
          // Hide bubble
          await hideBubbleWithFade();
        });
      }
    });
  </script>
</body>
</html>
